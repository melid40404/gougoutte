<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gouttes - Calcul Mental</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <div class="hud">
      <div class="score">SCORE <span id="score">0</span></div>
    </div>

    <div class="lives" aria-label="Vies">
      <span class="life"></span>
      <span class="life"></span>
      <span class="life"></span>
    </div>

    <div class="input" aria-live="polite">
      <span id="inputValue"></span>
    </div>

    <div class="mobile-controls" id="mobileControls" aria-label="Clavier">
      <div class="keypad">
        <button class="key" data-key="7">7</button>
        <button class="key" data-key="8">8</button>
        <button class="key" data-key="9">9</button>
        <button class="key" data-key="4">4</button>
        <button class="key" data-key="5">5</button>
        <button class="key" data-key="6">6</button>
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
        <button class="key key-wide" data-key="back">⌫</button>
        <button class="key" data-key="0">0</button>
        <button class="key key-wide" data-key="enter">OK</button>
      </div>
    </div>

    <div class="overlay" id="overlay" hidden>
      <div class="panel">
        <div class="title">Game Over</div>
        <div class="final">Score: <span id="finalScore">0</span></div>
        <div class="hint">Appuyez sur Entrée pour rejouer</div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
